<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarScout v3.06</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;--dark:#475569;--accent:#3b82f6;--accent2:#8b5cf6;--green:#4ade80;--input:#0f172a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
.wrap{max-width:1100px;margin:0 auto;padding:16px 20px 40px}
header{border-bottom:1px solid var(--border);padding:18px 20px}
.hdr{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:12px;color:var(--dark);margin-top:2px}
.ver{font-size:10px;color:#334155;font-family:monospace}
.api-ctr{font-size:10px;color:var(--dim);font-family:monospace;text-align:right;margin-top:2px}
.api-ctr b{color:var(--muted)}
.card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:14px}
.fields{display:flex;flex-wrap:wrap;gap:10px}
.field{flex:1 1 120px;min-width:100px}
.field label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:block}
.field input{background:var(--input);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:13px;width:100%;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{padding:10px 20px;font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.25);flex:1}
.btn-primary:hover{box-shadow:0 6px 24px rgba(59,130,246,.35)}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{background:var(--border);color:var(--text);flex:0 0 auto}
.btn-secondary:hover{background:#475569}
.btn:disabled{opacity:.4;cursor:default}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 16px rgba(34,197,94,.25);flex:1}
.btn-green:hover{box-shadow:0 6px 24px rgba(34,197,94,.35)}

/* Trim picker */
.trim-picker{display:none}
.trim-picker h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.trim-picker .hint{font-size:12px;color:var(--dim);margin-bottom:12px}
.trim-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.trim-opt{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:2px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s;user-select:none}
.trim-opt:hover{border-color:var(--dim)}
.trim-opt.selected{border-color:var(--green);background:#22c55e12}
.trim-opt input{display:none}
.trim-opt .tname{font-size:13px;font-weight:500;color:var(--text)}
.trim-opt .tcount{font-size:11px;color:var(--dim);margin-left:2px}
.trim-opt.selected .tname{color:var(--green)}
.cost-note{font-size:12px;color:var(--muted);margin-bottom:10px}
.cost-note b{color:#60a5fa}

/* Sources */
.sources-section h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:8px}
.source-grid{display:flex;flex-wrap:wrap;gap:6px}
.source-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;user-select:none}
.source-chip:hover{border-color:var(--dim)}
.source-chip.checked{border-color:var(--sc);background:color-mix(in srgb,var(--sc) 12%,transparent)}
.source-chip.checked .sname{color:var(--sc)}
.source-chip input{display:none}
.source-chip .sdot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .15s}
.source-chip.checked .sdot{background:var(--sc)}
.sname{color:var(--muted);transition:color .15s}
.source-actions{display:flex;gap:8px;margin-top:8px}
.source-actions button{background:none;border:none;color:var(--dim);font-size:11px;cursor:pointer;text-decoration:underline}
.source-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.source-links a{border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--muted);transition:all .15s}
.source-links a:hover{border-color:var(--accent);color:var(--accent)}

/* Filters */
.filter-bar{display:none;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px}
.filter-bar label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-right:2px}
.filter-bar select{background:var(--input);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;font-size:12px;outline:none;min-width:100px}
.filter-bar .spacer{flex:1}
.filter-bar .count{font-size:13px;color:var(--muted)}
.filter-bar .count b{color:var(--text)}
.kw-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.kw-row input{background:var(--input);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;font-size:12px;outline:none;width:140px}

/* Results */
.results{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.listing{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border);display:flex;flex-direction:column;transition:border-color .15s}
.listing:hover{border-color:#475569}
.listing.target{border-color:var(--green);border-width:2px}
.listing .photo{height:200px;overflow:hidden;background:#0f172a}
.listing .photo img{width:100%;height:100%;object-fit:cover}
.listing .photo .no-img{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dark);font-size:13px}
.listing .body{padding:14px;flex:1;display:flex;flex-direction:column}
.listing .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.listing .title{font-size:15px;font-weight:700;color:#f1f5f9}
.listing .trim{font-size:12px;margin-top:2px}
.listing .trim.hit{color:var(--green);font-weight:600}
.listing .trim.miss{color:var(--muted)}
.listing .price{font-size:20px;font-weight:700;color:#60a5fa;white-space:nowrap}
.listing .specs{display:flex;gap:10px;font-size:12px;color:var(--muted);margin-bottom:8px;flex-wrap:wrap}
.listing .dealer{font-size:12px;color:var(--dim);margin-top:auto;padding-top:6px}
.listing .dealer p{margin:1px 0}
.listing .vin{font-family:monospace;font-size:10px;color:var(--dark)}
.find-links{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}
.find-links a{flex:1;text-align:center;padding:7px 4px;border-radius:5px;font-size:11px;font-weight:600;transition:all .15s;min-width:60px;border:1px solid var(--border)}
.find-links a:hover{opacity:.8;transform:translateY(-1px)}
.loader{text-align:center;padding:60px 20px;color:var(--dim)}
.loader .spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--dim);font-size:14px}
footer{text-align:center;padding:20px;color:#1e293b;font-size:10px;font-family:monospace}
</style>
</head>
<body>
<header>
  <div class="hdr">
    <div>
      <h1>CarScout</h1>
      <p class="sub">Search &amp; browse used car listings across all dealers</p>
    </div>
    <div>
      <span class="ver">v3.06</span>
      <div class="api-ctr">API calls this session: <b id="apiCount">0</b> / 1,000 mo</div>
    </div>
  </div>
</header>
<div class="wrap">
  <!-- Stage 1: Search Form -->
  <div class="card" id="searchCard">
    <div class="fields">
      <div class="field"><label>Make</label><input id="make" value="Toyota"></div>
      <div class="field"><label>Model</label><input id="model" value="Tacoma"></div>
      <div class="field"><label>Year Min</label><input id="yearMin" value="2024"></div>
      <div class="field"><label>Year Max</label><input id="yearMax" value="2026"></div>
      <div class="field"><label>Price Min</label><input id="priceMin" value="" placeholder="$"></div>
      <div class="field"><label>Price Max</label><input id="priceMax" value="" placeholder="$"></div>
      <div class="field"><label>Max Miles</label><input id="mileageMax" value="" placeholder="e.g. 30000"></div>
      <div class="field"><label>Zip Code</label><input id="zip" value="32514"></div>
      <div class="field"><label>Radius (mi)</label><input id="distance" value="250"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="scanBtn" onclick="doScan()">Step 1: Scan Available Trims (1 API call)</button>
      <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- Stage 2: Trim Picker -->
  <div class="card trim-picker" id="trimPicker">
    <h3>Available Trims Found</h3>
    <p class="hint">Select the trims you want, then fetch full results. Each selected trim = 1 API call.</p>
    <div class="trim-grid" id="trimGrid"></div>
    <p class="cost-note" id="costNote">Selected: <b>0 trims</b> → 0 API calls</p>
    <div class="btn-row">
      <button class="btn btn-green" id="fetchBtn" onclick="doFetch()">Step 2: Fetch Selected Trims</button>
      <button class="btn btn-secondary" onclick="doScan()">Re-Scan</button>
    </div>
  </div>

  <!-- Sources -->
  <div class="card sources-section">
    <h3>Also Search These Sites Directly</h3>
    <div class="source-grid" id="sourceGrid"></div>
    <div class="source-actions">
      <button onclick="toggleAllSources(true)">Select All</button>
      <button onclick="toggleAllSources(false)">Deselect All</button>
    </div>
    <div class="source-links" id="sourceLinks" style="margin-top:10px"></div>
    <button class="btn btn-secondary" style="margin-top:10px;padding:8px 16px;font-size:13px" onclick="openSelected()">Open Selected Sites ↗</button>
  </div>

  <!-- Result Filters -->
  <div class="filter-bar" id="filterBar">
    <label>Color</label>
    <select id="colorFilter" onchange="renderFiltered()"><option value="all">All</option></select>
    <label>Drivetrain</label>
    <select id="driveFilter" onchange="renderFiltered()"><option value="all">All</option></select>
    <div class="kw-row">
      <label>Keyword</label>
      <input id="kwFilter" placeholder="type to filter…" oninput="renderFiltered()">
    </div>
    <label>Sort</label>
    <select id="sortBy" onchange="renderFiltered()">
      <option value="price_asc">Price ↑</option>
      <option value="price_desc">Price ↓</option>
      <option value="miles_asc">Miles ↑</option>
      <option value="year_desc">Newest</option>
      <option value="dist_asc">Nearest</option>
    </select>
    <div class="spacer"></div>
    <div class="count" id="countLabel"></div>
  </div>

  <div id="output"></div>
</div>
<footer>CarScout v3.06</footer>

<script>
const API_BASE=location.hostname==="localhost"||location.hostname==="127.0.0.1"?"http://localhost:8888":"";
const FIELDS=["make","model","yearMin","yearMax","priceMin","priceMax","mileageMax","zip","distance"];
const TARGET_TRIMS=["trd pro","sport premium","off-road premium","off road premium"];
const enc=s=>encodeURIComponent(s||"");
const low=s=>(s||"").toLowerCase().replace(/\s+/g,"-");
const g=k=>document.getElementById(k).value.trim();
const fmt$=v=>v?"$"+Number(v).toLocaleString():"N/A";
const fmtMi=v=>v?Number(v).toLocaleString()+" mi":"N/A";

let allResults=[], discoveredTrims=[], selectedTrims=new Set(), apiCalls=0;
const photoCache={};

function bumpApi(n=1){apiCalls+=n;document.getElementById("apiCount").textContent=apiCalls}

/* ── Base params builder ── */
function baseParams(){
  const p=new URLSearchParams();
  const make=g("make"),model=g("model");
  if(make)p.set("vehicle.make",make);
  if(model)p.set("vehicle.model",model);
  const yMin=g("yearMin"),yMax=g("yearMax");
  if(yMin||yMax)p.set("vehicle.year",`${yMin||"2000"}-${yMax||"2030"}`);
  const pMin=g("priceMin"),pMax=g("priceMax");
  if(pMin||pMax)p.set("retailListing.price",`${pMin||"1"}-${pMax||"999999"}`);
  const mi=g("mileageMax");
  if(mi)p.set("retailListing.miles",`0-${mi}`);
  const zip=g("zip"),dist=g("distance");
  if(zip){p.set("zip",zip);p.set("distance",dist||"250")}
  p.set("limit","100");
  return p;
}

async function apiFetch(params){
  const res=await fetch(`${API_BASE}/api/listings?${params.toString()}`);
  bumpApi();
  if(!res.ok){const t=await res.text();let m=`Error ${res.status}`;try{m=JSON.parse(t).error||m}catch{}throw new Error(m)}
  return await res.json();
}

/* ═══════ STAGE 1: Scan for trims ═══════ */
async function doScan(){
  const btn=document.getElementById("scanBtn");
  btn.disabled=true;btn.textContent="Scanning…";
  document.getElementById("output").innerHTML=`<div class="loader"><div class="spin"></div>Scanning available trims (1 API call)…</div>`;
  document.getElementById("filterBar").style.display="none";
  document.getElementById("trimPicker").style.display="none";

  try{
    const json=await apiFetch(baseParams());
    const listings=Array.isArray(json.data)?json.data:[];
    const total=json.total||json.totalCount||listings.length;

    if(json.data?.[0])console.log("Sample listing:",JSON.stringify(json.data[0],null,2));

    // Count trims
    const trimMap={};
    listings.forEach(l=>{
      const t=l?.vehicle?.trim||"Unknown";
      trimMap[t]=(trimMap[t]||0)+1;
    });

    discoveredTrims=Object.entries(trimMap).sort((a,b)=>b[1]-a[1]).map(([name,count])=>({name,count}));

    // Pre-select target trims
    selectedTrims=new Set();
    discoveredTrims.forEach(t=>{
      if(TARGET_TRIMS.some(tt=>t.name.toLowerCase().includes(tt))) selectedTrims.add(t.name);
    });

    renderTrimPicker(total);
    document.getElementById("output").innerHTML=`<div class="empty" style="padding:30px">
      <p style="color:var(--text);font-size:15px;margin-bottom:6px">Found <b>${total.toLocaleString()}</b> total listings with <b>${discoveredTrims.length}</b> trim levels</p>
      <p>Select the trims you want above, then click "Fetch Selected Trims"</p>
    </div>`;

  }catch(err){
    document.getElementById("output").innerHTML=`<div class="empty"><p style="color:#f87171">${err.message}</p></div>`;
  }finally{btn.disabled=false;btn.textContent="Step 1: Scan Available Trims (1 API call)"}
}

function renderTrimPicker(total){
  const picker=document.getElementById("trimPicker");
  picker.style.display="block";
  const grid=document.getElementById("trimGrid");
  grid.innerHTML=discoveredTrims.map(t=>{
    const sel=selectedTrims.has(t.name);
    const isTarget=TARGET_TRIMS.some(tt=>t.name.toLowerCase().includes(tt));
    return`<label class="trim-opt${sel?" selected":""}" onclick="setTimeout(updateTrimSelection,0)">
      <input type="checkbox" data-trim="${t.name}" ${sel?"checked":""}>
      <span class="tname">${t.name}</span>
      <span class="tcount">(${t.count} in sample${total>100?", likely more":""})</span>
    </label>`;
  }).join("");
  // Add "All trims (no filter)" option
  grid.innerHTML+=`<label class="trim-opt${selectedTrims.size===0?" selected":""}" onclick="selectAllTrims()">
    <input type="checkbox" data-trim="__ALL__">
    <span class="tname">All Trims (no filter)</span>
    <span class="tcount">(1 call, 100 max)</span>
  </label>`;
  updateCostNote();
}

function selectAllTrims(){
  selectedTrims.clear();
  document.querySelectorAll(".trim-opt input").forEach(cb=>{cb.checked=false});
  document.querySelector('[data-trim="__ALL__"]').checked=true;
  updateTrimSelection();
}

function updateTrimSelection(){
  selectedTrims.clear();
  document.querySelectorAll(".trim-opt input:checked").forEach(cb=>{
    if(cb.dataset.trim!=="__ALL__") selectedTrims.add(cb.dataset.trim);
  });
  document.querySelectorAll(".trim-opt").forEach(el=>{
    el.classList.toggle("selected",el.querySelector("input").checked);
  });
  // If __ALL__ is checked, uncheck specifics
  const allCb=document.querySelector('[data-trim="__ALL__"]');
  if(allCb&&allCb.checked){
    selectedTrims.clear();
    document.querySelectorAll('.trim-opt input:not([data-trim="__ALL__"])').forEach(cb=>{cb.checked=false;cb.closest(".trim-opt").classList.remove("selected")});
  }
  updateCostNote();
}

function updateCostNote(){
  const n=selectedTrims.size||1; // "All" = 1 call
  const isAll=selectedTrims.size===0;
  document.getElementById("costNote").innerHTML=isAll
    ?`Selected: <b>All trims</b> → <b>1</b> API call (100 results max)`
    :`Selected: <b>${selectedTrims.size} trim${selectedTrims.size>1?"s":""}</b> → <b>${selectedTrims.size}</b> API call${selectedTrims.size>1?"s":""} (100 per trim)`;
}

/* ═══════ STAGE 2: Fetch selected trims ═══════ */
async function doFetch(){
  const btn=document.getElementById("fetchBtn");
  btn.disabled=true;btn.textContent="Fetching…";

  const isAll=selectedTrims.size===0;
  const trimList=isAll?[null]:[...selectedTrims];

  document.getElementById("output").innerHTML=`<div class="loader"><div class="spin"></div>Fetching ${isAll?"all trims":trimList.length+" trim"+(trimList.length>1?"s":"")}…</div>`;
  document.getElementById("filterBar").style.display="none";

  try{
    let merged=[];
    for(let i=0;i<trimList.length;i++){
      const trim=trimList[i];
      document.querySelector(".loader").innerHTML=`<div class="spin"></div>Fetching${trim?" "+trim:""} (${i+1}/${trimList.length})… ${merged.length} listings so far`;

      const params=baseParams();
      if(trim) params.set("vehicle.trim",`*${trim}*`);
      const json=await apiFetch(params);
      const listings=Array.isArray(json.data)?json.data:[];
      merged=merged.concat(listings);
    }

    // Dedup by VIN
    const seen=new Set();
    allResults=merged.filter(l=>{const v=l?.vin;if(!v||seen.has(v))return false;seen.add(v);return true});

    // Populate color + drivetrain filters
    populateFilter("colorFilter",allResults.map(l=>l?.vehicle?.exteriorColor));
    populateFilter("driveFilter",allResults.map(l=>l?.vehicle?.drivetrain));

    renderFiltered();
  }catch(err){
    document.getElementById("output").innerHTML=`<div class="empty"><p style="color:#f87171">${err.message}</p></div>`;
  }finally{btn.disabled=false;btn.textContent="Step 2: Fetch Selected Trims"}
}

function populateFilter(id,values){
  const el=document.getElementById(id);
  const all=values.filter(Boolean);
  const sorted=[...new Set(all)].sort();
  el.innerHTML=`<option value="all">All (${sorted.length})</option>`+
    sorted.map(v=>`<option value="${v}">${v} (${all.filter(x=>x===v).length})</option>`).join("");
  el.value="all";
}

/* ── Client-side filter + sort ── */
function renderFiltered(){
  const colorVal=document.getElementById("colorFilter").value;
  const driveVal=document.getElementById("driveFilter").value;
  const sortVal=document.getElementById("sortBy").value;
  const kw=(document.getElementById("kwFilter").value||"").toLowerCase();

  let f=[...allResults];
  if(colorVal!=="all")f=f.filter(l=>(l?.vehicle?.exteriorColor||"")===colorVal);
  if(driveVal!=="all")f=f.filter(l=>(l?.vehicle?.drivetrain||"")===driveVal);
  if(kw)f=f.filter(l=>{
    const hay=[l?.vehicle?.trim,l?.vehicle?.engine,l?.vehicle?.drivetrain,
      l?.vehicle?.exteriorColor,l?.retailListing?.dealerName,
      l?.retailListing?.description,l?.description,
      ...(l?.vehicle?.features||[])].filter(Boolean).join(" ").toLowerCase();
    return hay.includes(kw);
  });

  f.sort((a,b)=>{
    const pa=a?.retailListing?.price??999999,pb=b?.retailListing?.price??999999;
    const ma=a?.retailListing?.miles??999999,mb=b?.retailListing?.miles??999999;
    const ya=a?.vehicle?.year??0,yb=b?.vehicle?.year??0;
    const da=a?.retailListing?.distanceMiles??999999,db=b?.retailListing?.distanceMiles??999999;
    switch(sortVal){case"price_asc":return pa-pb;case"price_desc":return pb-pa;case"miles_asc":return ma-mb;case"year_desc":return yb-ya;case"dist_asc":return da-db;default:return 0}
  });

  document.getElementById("filterBar").style.display="flex";
  document.getElementById("countLabel").innerHTML=`<b>${allResults.length}</b> fetched · <b>${f.length}</b> shown`;
  renderCards(f);
}

/* ── Photos ── */
function getPhoto(l){
  const paths=[l?.media?.photos?.[0]?.url,l?.media?.photos?.[0],l?.media?.photo?.url,l?.media?.photo,
    l?.photos?.[0]?.url,l?.photos?.[0],l?.photo,l?.image,l?.imageUrl,
    l?.retailListing?.photoUrl,l?.retailListing?.imageUrl,l?.vehicle?.photoUrl,l?.vehicle?.imageUrl];
  for(const c of paths)if(typeof c==="string"&&c.startsWith("http"))return c;
  return null;
}
async function loadPhoto(vin,imgEl,noEl){
  if(!vin){noEl.textContent="No photo";return}
  if(photoCache[vin]){imgEl.src=photoCache[vin];imgEl.style.display="";noEl.style.display="none";return}
  try{
    const res=await fetch(`${API_BASE}/api/photo/${vin}`);bumpApi();
    if(!res.ok){noEl.textContent="No photo";return}
    const json=await res.json();
    const urls=json?.data?.retail||json?.data?.wholesale||[];
    if(urls.length){photoCache[vin]=urls[0];imgEl.src=urls[0];imgEl.style.display="";noEl.style.display="none"}
    else noEl.textContent="No photo";
  }catch{noEl.textContent="No photo"}
}

/* ── VIN deep links ── */
function vinLinks(vin,year,make,model){
  if(!vin)return"";
  const q=enc(`${year} ${make} ${model} VIN ${vin} for sale`);
  const links=[
    {name:"AutoTrader",color:"#E8364A",url:`https://www.autotrader.com/cars-for-sale/vehicledetails.xhtml?listingTypes=USED&vin=${vin}`},
    {name:"CarGurus",color:"#6C3EC1",url:`https://www.cargurus.com/Cars/link/${vin}`},
    {name:"Cars.com",color:"#0070C0",url:`https://www.cars.com/vehicledetail/${vin}/`},
    {name:"Google",color:"#34A853",url:`https://www.google.com/search?q=${q}`},
  ];
  return`<div class="find-links">${links.map(l=>
    `<a href="${l.url}" target="_blank" rel="noopener" style="background:${l.color}18;color:${l.color};border-color:${l.color}44">${l.name}</a>`
  ).join("")}</div>`;
}

/* ── Render cards ── */
function renderCards(listings){
  if(!listings.length){document.getElementById("output").innerHTML=`<div class="empty">No listings match your filters.</div>`;return}

  document.getElementById("output").innerHTML=`<div class="results">${listings.map((l,i)=>{
    const v=l?.vehicle||{},r=l?.retailListing||{};
    const price=r.price||l?.price;
    const miles=r.miles||l?.mileage;
    const trimLower=(v.trim||"").toLowerCase();
    const isTarget=TARGET_TRIMS.some(t=>trimLower.includes(t));
    const dealer=r.dealerName||l?.dealer?.name||"";
    const city=r.city||r.dealerCity||"";
    const state=r.state||r.dealerState||"";
    const dist=r.distanceMiles;
    const vin=l?.vin||"";
    const listingUrl=r.url||r.listingUrl||r.dealerUrl||l?.url||l?.listingUrl||"";
    const ph=getPhoto(l);

    return`<div class="listing${isTarget?" target":""}">
      <div class="photo">
        <img id="p${i}" src="${ph||""}" alt="${v.year} ${v.make} ${v.model}" loading="lazy" style="${ph?"":"display:none"}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="no-img" id="n${i}" style="display:${ph?"none":"flex"}">Loading…</div>
      </div>
      <div class="body">
        <div class="top">
          <div>
            <div class="title">${v.year||""} ${v.make||""} ${v.model||""}</div>
            <div class="trim ${isTarget?"hit":"miss"}">${v.trim||"—"}</div>
          </div>
          <div class="price">${fmt$(price)}</div>
        </div>
        <div class="specs">
          <span>${fmtMi(miles)}</span>
          ${v.drivetrain?`<span>${v.drivetrain}</span>`:""}
          ${v.engine?`<span>${v.engine}</span>`:""}
          ${v.exteriorColor?`<span>🎨 ${v.exteriorColor}</span>`:""}
          ${dist!=null?`<span>📍 ${Math.round(dist)} mi</span>`:""}
        </div>
        <div class="dealer">
          ${dealer?`<p>${dealer}</p>`:""}
          ${city||state?`<p>${[city,state].filter(Boolean).join(", ")}</p>`:""}
          ${vin?`<p class="vin">VIN: ${vin}</p>`:""}
        </div>
        ${listingUrl?`<a href="${listingUrl}" target="_blank" rel="noopener" style="display:block;text-align:center;margin-top:10px;background:var(--accent);color:#fff;padding:8px;border-radius:6px;font-size:13px;font-weight:600">View Original Listing ↗</a>`:""}
        ${vinLinks(vin,v.year,v.make,v.model)}
      </div>
    </div>`;
  }).join("")}</div>`;

  // Lazy-load photos
  listings.forEach((l,i)=>{
    if(!getPhoto(l)&&l?.vin){
      const img=document.getElementById(`p${i}`),no=document.getElementById(`n${i}`);
      if(img&&no)loadPhoto(l.vin,img,no);
    }
  });
}

/* ── Sites ── */
const SITES=[
  {id:"autotrader",name:"AutoTrader",color:"#E8364A",checked:true,build:v=>{let u=`https://www.autotrader.com/cars-for-sale/all-cars/${low(v.make)}/${low(v.model)}${v.zip?"/"+v.zip:""}`;const q=[`searchRadius=${v.distance||100}`];if(v.yearMin)q.push(`startYear=${v.yearMin}`);if(v.yearMax)q.push(`endYear=${v.yearMax}`);if(v.priceMax)q.push(`maxPrice=${v.priceMax}`);if(v.priceMin)q.push(`minPrice=${v.priceMin}`);if(v.mileageMax)q.push(`maxMileage=${v.mileageMax}`);return u+"?"+q.join("&")}},
  {id:"cargurus",name:"CarGurus",color:"#6C3EC1",checked:true,build:v=>{const q=[`showNegotiable=true`,`sortDir=ASC`,`sortType=PRICE`];if(v.yearMin)q.push(`startYear=${v.yearMin}`);if(v.yearMax)q.push(`endYear=${v.yearMax}`);if(v.priceMax)q.push(`maxPrice=${v.priceMax}`);if(v.priceMin)q.push(`minPrice=${v.priceMin}`);if(v.mileageMax)q.push(`maxMileage=${v.mileageMax}`);if(v.distance)q.push(`distance=${v.distance}`);if(v.zip)q.push(`zip=${v.zip}`);return`https://www.cargurus.com/Cars/inventorylisting/viewDetailsFilterViewInventoryListing.action?`+q.join("&")}},
  {id:"carscom",name:"Cars.com",color:"#0070C0",checked:true,build:v=>{const q=[`stock_type=all`,`makes[]=${enc(v.make)}`,`models[]=${enc(v.make)}-${enc(v.model)}`,`maximum_distance=${v.distance||100}`];if(v.yearMin)q.push(`year_min=${v.yearMin}`);if(v.yearMax)q.push(`year_max=${v.yearMax}`);if(v.priceMax)q.push(`list_price_max=${v.priceMax}`);if(v.priceMin)q.push(`list_price_min=${v.priceMin}`);if(v.mileageMax)q.push(`mileage_max=${v.mileageMax}`);if(v.zip)q.push(`zip=${v.zip}`);return`https://www.cars.com/shopping/results/?`+q.join("&")}},
  {id:"carvana",name:"Carvana",color:"#00AEF0",checked:true,build:v=>{let u=`https://www.carvana.com/cars/${low(v.make)}-${low(v.model)}`;const q=[];if(v.yearMin||v.yearMax)q.push(`year=${v.yearMin||""}-${v.yearMax||""}`);if(v.priceMin||v.priceMax)q.push(`price=${v.priceMin||""}-${v.priceMax||""}`);if(v.mileageMax)q.push(`mileage=-${v.mileageMax}`);return q.length?u+"?"+q.join("&"):u}},
  {id:"carmax",name:"CarMax",color:"#2962FF",checked:true,build:v=>{let u=`https://www.carmax.com/cars/${low(v.make)}/${low(v.model)}`;const q=[];if(v.yearMin||v.yearMax)q.push(`year=${v.yearMin||""}-${v.yearMax||""}`);if(v.priceMin||v.priceMax)q.push(`price=${v.priceMin||""}-${v.priceMax||""}`);if(v.mileageMax)q.push(`mileage=-${v.mileageMax}`);return q.length?u+"?"+q.join("&"):u}},
  {id:"truecar",name:"TrueCar",color:"#00897B",checked:true,build:v=>{let u=`https://www.truecar.com/used-cars-for-sale/listings/${low(v.make)}/${low(v.model)}/`;if(v.yearMin||v.yearMax)u+=`year-${v.yearMin||"2000"}-${v.yearMax||"max"}/`;if(v.priceMin||v.priceMax)u+=`price-${v.priceMin||"0"}-${v.priceMax||"max"}/`;const q=[];if(v.zip)q.push(`searchRadius=${v.distance||100}`);return q.length?u+"?"+q.join("&"):u}},
  {id:"facebook",name:"Facebook",color:"#1877F2",checked:true,build:v=>{const q=[`minYear=${v.yearMin||""}`,`maxYear=${v.yearMax||""}`,`make=${enc(v.make)}`,`model=${enc(v.model)}`];if(v.priceMax)q.push(`maxPrice=${v.priceMax}`);if(v.priceMin)q.push(`minPrice=${v.priceMin}`);if(v.mileageMax)q.push(`maxMileage=${v.mileageMax}`);return`https://www.facebook.com/marketplace/category/vehicles?`+q.join("&")}},
  {id:"edmunds",name:"Edmunds",color:"#FF6D00",checked:true,build:v=>{const q=[`make=${enc(v.make)}`,`model=${enc(v.make)}|${enc(v.model)}`];if(v.yearMin)q.push(`year=${v.yearMin}-${v.yearMax||v.yearMin}`);if(v.zip)q.push(`zip=${v.zip}`);if(v.distance)q.push(`radius=${v.distance}`);return`https://www.edmunds.com/inventory/srp.html?`+q.join("&")}},
];
function renderSources(){document.getElementById("sourceGrid").innerHTML=SITES.map(s=>`<label class="source-chip${s.checked?" checked":""}" style="--sc:${s.color}" onclick="setTimeout(updateSourceChips,0)"><input type="checkbox" ${s.checked?"checked":""} onchange="SITES.find(x=>x.id==='${s.id}').checked=this.checked"><span class="sdot"></span><span class="sname">${s.name}</span></label>`).join("");updateSourceLinks()}
function updateSourceChips(){document.querySelectorAll(".source-chip").forEach(el=>el.classList.toggle("checked",el.querySelector("input").checked));updateSourceLinks()}
function toggleAllSources(on){SITES.forEach(s=>s.checked=on);document.querySelectorAll(".source-chip input").forEach(cb=>cb.checked=on);updateSourceChips()}
function getParams(){const v={};FIELDS.forEach(k=>v[k]=g(k));return v}
function updateSourceLinks(){const v=getParams();document.getElementById("sourceLinks").innerHTML=SITES.filter(s=>s.checked).map(s=>`<a href="${s.build(v)}" target="_blank" rel="noopener" style="border-color:${s.color}44;color:${s.color}">${s.name} ↗</a>`).join("")}
function openSelected(){const v=getParams();SITES.filter(s=>s.checked).forEach((s,i)=>setTimeout(()=>window.open(s.build(v),"_blank"),i*250))}

function clearAll(){
  FIELDS.forEach(k=>document.getElementById(k).value="");
  document.getElementById("make").value="Toyota";
  document.getElementById("model").value="Tacoma";
  document.getElementById("yearMin").value="2024";
  document.getElementById("yearMax").value="2026";
  document.getElementById("zip").value="32514";
  document.getElementById("distance").value="250";
  document.getElementById("output").innerHTML="";
  document.getElementById("filterBar").style.display="none";
  document.getElementById("trimPicker").style.display="none";
}

FIELDS.forEach(k=>{
  document.getElementById(k).addEventListener("keydown",e=>{if(e.key==="Enter")doScan()});
  document.getElementById(k).addEventListener("input",updateSourceLinks);
});

renderSources();
</script>
